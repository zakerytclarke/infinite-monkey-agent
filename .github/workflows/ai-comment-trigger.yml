name: AI Comment Trigger (Monkey)

on:
  issue_comment:
    types: [created]

jobs:
  run-agent:
    if: |
      contains(fromJSON('["COLLABORATOR", "MEMBER", "OWNER"]'), github.event.comment.author_association) && (
        contains(github.event.comment.body, '/monkey') ||
        contains(github.event.comment.body, '🐒') ||
        contains(github.event.comment.body, '🙊') ||
        contains(github.event.comment.body, '🙉') ||
        contains(github.event.comment.body, '🙈')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # If it's a PR, checkout the PR branch head; otherwise checkout default branch (main/master)
          ref: ${{ github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number) || '' }}
          fetch-depth: 0

      # Step 1: Run AI Developer Agent (only for Issue comments)
      - name: Run AI Developer Agent
        id: developer
        if: ${{ !github.event.issue.pull_request }}
        uses: ./
        with:
          subcommand: 'develop'
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          model: 'gpt-5.4'
          run_tests: 'true'
          max_steps: '30'

      # Step 2: Run AI Code Reviewer (for PR comments, or newly created PRs)
      - name: Run AI Code Reviewer
        if: ${{ github.event.issue.pull_request || steps.developer.outputs.pr_number != '' }}
        uses: ./
        with:
          subcommand: 'review'
          pr_number: ${{ github.event.issue.pull_request && github.event.issue.number || steps.developer.outputs.pr_number }}
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          model: 'gpt-5.4'
          run_tests: 'true'
