name: 'Infinite Monkey Agent'
description: 'Infinite Monkey Agent: AI-powered code reviewer and autonomous developer agent written in Python'
author: 'zakerytclarke'
branding:
  icon: 'code'
  color: 'blue'
outputs:
  pr_number:
    description: 'The number of the created Pull Request (for develop subcommand)'
    value: ${{ steps.run-agent.outputs.pr_number }}
inputs:
  openrouter_api_key:
    description: 'OpenRouter API Key'
    required: false
  openai_api_key:
    description: 'OpenAI API Key'
    required: false
  gemini_api_key:
    description: 'Gemini API Key'
    required: false
  model:
    description: 'Model to use (default: gpt-5.4)'
    required: false
    default: 'gpt-5.4'
  custom_prompt:
    description: 'Custom instructions, code guidelines, or style preferences'
    required: false
  github_token:
    description: 'GitHub token for posting reviews'
    required: false
    default: ${{ github.token }}
  run_tests:
    description: 'Run project tests and send failures to LLM (true/false)'
    required: false
    default: 'true'
  test_command:
    description: 'Custom command to run tests'
    required: false
  max_steps:
    description: 'Maximum step limit for the developer agent loop'
    required: false
    default: '30'
  pr_number:
    description: 'Specific Pull Request number to review'
    required: false
  subcommand:
    description: 'Explicit subcommand to run (develop or review)'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -f "$GITHUB_ACTION_PATH/pyproject.toml" ]; then
          pip install "$GITHUB_ACTION_PATH"
        else
          pip install infinite-monkey-agent
        fi
    - name: Run Infinite Monkey Agent CLI
      id: run-agent
      shell: bash
      run: |
        infinite-monkey-agent
      env:
        OPENROUTER_API_KEY: ${{ inputs.openrouter_api_key || env.OPENROUTER_API_KEY }}
        OPENAI_API_KEY: ${{ inputs.openai_api_key || env.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ inputs.gemini_api_key || env.GEMINI_API_KEY }}
        GITHUB_TOKEN: ${{ inputs.github_token || env.GITHUB_TOKEN }}
        AI_REVIEWER_MODEL: ${{ inputs.model || env.AI_REVIEWER_MODEL }}
        AI_REVIEWER_PROMPT: ${{ inputs.custom_prompt || env.AI_REVIEWER_PROMPT }}
        AI_REVIEWER_RUN_TESTS: ${{ inputs.run_tests || env.AI_REVIEWER_RUN_TESTS }}
        AI_REVIEWER_TEST_COMMAND: ${{ inputs.test_command || env.AI_REVIEWER_TEST_COMMAND }}
        AI_REVIEWER_MAX_STEPS: ${{ inputs.max_steps || env.AI_REVIEWER_MAX_STEPS }}
        PR_NUMBER: ${{ inputs.pr_number || env.PR_NUMBER }}
        AI_REVIEWER_SUBCOMMAND: ${{ inputs.subcommand || env.AI_REVIEWER_SUBCOMMAND }}
